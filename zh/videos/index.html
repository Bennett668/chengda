<script>

    renderShell('videos');
    document.querySelectorAll('.v-card').forEach(function (card) {
      var frame = card.querySelector('.v-frame');
      var src = card.getAttribute('data-src');
      if (!frame || !src) return;
      frame.addEventListener('click', function () {
        if (frame.querySelector('video')) return;
        var v = document.createElement('video');
        v.src = src; v.controls = true; v.autoplay = true; v.playsInline = true;
        v.setAttribute('playsinline', ''); v.setAttribute('preload', 'metadata');
        frame.innerHTML = ''; frame.appendChild(v);
      });
    });
